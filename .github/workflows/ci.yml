name: Dragon Brain CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ── Unit Tests (fast, every push) ──────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    services:
      falkordb:
        image: falkordb/falkordb:v4.14.11
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:v1.16.3
        ports:
          - 6333:6333
        options: >-
          --health-cmd "curl -f http://localhost:6333/healthz || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tox

      - name: Run unit test suite
        run: tox -e pulse
        env:
          FALKORDB_HOST: localhost
          FALKORDB_PORT: 6379
          QDRANT_HOST: localhost
          QDRANT_PORT: 6333

      - name: Run integration tests
        run: |
          pip install -e ".[dev]"
          pytest tests/integration/ -m integration --timeout=120 -v
        env:
          FALKORDB_HOST: localhost
          FALKORDB_PORT: 6379
          QDRANT_HOST: localhost
          QDRANT_PORT: 6333

  # ── Version Compatibility Matrix ───────────────────────────
  compat:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        falkordb-version: ["v4.14.11", "latest"]
        qdrant-version: ["v1.16.3", "latest"]
        exclude:
          # Skip the pinned+pinned combo — already tested in 'test' job
          - falkordb-version: "v4.14.11"
            qdrant-version: "v1.16.3"

    services:
      falkordb:
        image: falkordb/falkordb:${{ matrix.falkordb-version }}
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:${{ matrix.qdrant-version }}
        ports:
          - 6333:6333
        options: >-
          --health-cmd "curl -f http://localhost:6333/healthz || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run compatibility smoke tests
        run: |
          pytest tests/integration/ -m integration --timeout=120 -v
        env:
          FALKORDB_HOST: localhost
          FALKORDB_PORT: 6379
          QDRANT_HOST: localhost
          QDRANT_PORT: 6333
