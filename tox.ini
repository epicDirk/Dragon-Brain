[tox]
envlist = pulse, gate, hammer, polish, reaper
isolated_build = True
# Additional envs (not in default envlist — run explicitly):
# tox -e integration    (requires live FalkorDB + Qdrant)
# tox -e crosshair      (symbolic execution — slow, nightly only)

[testenv]
allowlist_externals = poetry
setenv =
    PYTHONWARNINGS = ignore:urllib3:Warning

# Tier 0: The Pulse (Fast, Frequent)
[testenv:pulse]
description = Run fast checks: Ruff (lint/format), Pytest (Unit), Pre-commit
deps =
    ruff
    mypy
    pytest
    pytest-asyncio
    pytest-cov
    pre-commit
    nest_asyncio
    hypothesis
commands =
    ruff check src tests
    ruff format --check src tests
    mypy src
    pytest -m "not slow" --cov=claude_memory --cov=dashboard --cov-report=term-missing --cov-fail-under=70

# Tier 1: The Gate (Correctness, Pre-Commit)
[testenv:gate]
description = Run correctness checks: Hypothesis (Property), Diff-Cover
deps =
    hypothesis
    diff-cover
    pytest
    pytest-asyncio
    pytest-cov
    nest_asyncio
commands =
    pytest -m "not slow" --hypothesis-profile=ci --cov=claude_memory --cov=dashboard --cov-report=xml
    diff-cover coverage.xml --compare-branch=master --fail-under=100

# Tier 2: The Hammer (Brutal, Scheduled)
[testenv:hammer]
description = Run deep analysis: Security Linting, Dependency Audit, Secret Scanning
skip_install = true
deps =
    bandit
    pip-audit
    detect-secrets
commands =
    # Security Linting
    bandit -r src -s B101,B104,B112,B404,B602,B603,B607 -q

    # Dependency Vulnerability Check (ignore pip's own CVE in tox venv)
    pip-audit --ignore-vuln CVE-2026-1703

    # Secret Scanning
    detect-secrets scan src

    # Deep Security Patterns (semgrep — broader than bandit)
    semgrep scan --config=auto src/ --error --quiet


# Tier 3: The Polish (Documentation, Typos)
[testenv:polish]
description = Run polish checks: Codespell, Docstr-coverage
deps =
    codespell
    docstr-coverage
commands =
    codespell src tests
    docstr-coverage src

# Tier 4: The Reaper (Dead Code Detection)
[testenv:reaper]
description = Hunt dead code: unused functions, classes, variables, imports
skip_install = true
deps =
    vulture
commands =
    vulture src/ vulture_whitelist.py --min-confidence 80

# Integration Tests (requires live FalkorDB + Qdrant)
[testenv:integration]
description = Run integration tests against live FalkorDB + Qdrant
deps =
    pytest
    pytest-asyncio
    pytest-timeout
    nest_asyncio
commands =
    pytest tests/integration/ tests/gauntlet/test_golden_queries.py tests/gauntlet/test_load.py -m "integration or slow" --timeout=120 -v

# Symbolic Execution (slow — nightly/manual only)
[testenv:crosshair]
description = Symbolic execution contract verification
deps =
    crosshair-tool
    pytest
commands =
    pytest tests/crosshair/ -v --timeout=120
